name: Playwright End-to-End Tests



# Step 1: Define the triggers (Events)
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]


# Step 2: Define the execution environment (Jobs & Runners)
jobs:
  run-playwright-tests:
    runs-on: ubuntu-latest


    # Step 3: Sequential list of actions (Steps)
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven' # Automatically caches your dependencies for faster runs

    - name: Install Project Dependencies
      run: mvn compile # Ensures everything compiles

    - name: Ensure Playwright Browsers are Installed
      run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

    - name: Execute Playwright Tests
      run: mvn test



    # Step 4: Save reports even if tests fail (Artifacts)
    - name: Upload Test Report & Screenshots
      if: always() # Forces this step to run even if the test execution step fails
      uses: actions/upload-artifact@v4
      with:
        name: playwright-test-results
        path: |
          target/surefire-reports/
          test-results/
        retention-days: 7